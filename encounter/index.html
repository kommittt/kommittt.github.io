<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>* An encounter!</title>
    <meta name="description" content="originally meant for WebTiles, now available here as a secret!">
    <meta name="author" content="kommit">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <main>
        <div class="shitass">
            
            <audio loop autoplay id="anticipation">
                <source src="anticipation.mp3" type="audio/mp3">
                Your browser does not support the audio element.
            </audio>
            
            <div id="kommitimg">
                <img src="kommit.png" id="squish" alt="Kommit">
            </div>
            
            <div class="bbbb" id="textbox">
                <ul>
                    <li>KOMMIT - ATK 9 DEF 4</li>
                    <li>He's nervously looking around, as if lost.</li>
                </ul>
            </div>

            <div class="asd">
                <button onclick="diebru()">
                    <img src="fight.png" alt="Fight button" title="* Kill him.">
                </button>

                <button onclick="patpat()">
                    <img src="pat.png" alt="Pat button" title="* Looks like this makes him happy...">
                </button>

                <button onclick="item()">
                    <img src="item.png" alt="Item button" title="* yumby">
                </button>

                <button onclick="spare()">
                    <a target="_blank" href="https://kommittt.github.io/" onclick="return spare(event)">
                        <img src="visit.png" alt="Visit button" title="* He seems to be leading you somewhere...">
                    </a>
                </button>
            </div>

        </div>
    </main>
    
    <script src="app.js"></script>
